<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila Sem Fila</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>FILA SEM FILA</h1>
            <p id="status-loja">Painel em Tempo Real</p>
        </header>

        <main>
            <section class="painel-principal">
                <span class="label">CHAMANDO AGORA</span>
                <div id="senha-atual">--</div>
            </section>

            <section class="minha-senha-section">
                <input type="number" id="input-minha-senha" placeholder="Digite sua senha física">
                <button onclick="salvarMinhaSenha()">Acompanhar</button>
            </section>

            <div id="feedback-usuario" class="hidden">
                <p>Sua vez está chegando!</p>
                <div id="contador-faltam">Faltam -- pessoas</div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
