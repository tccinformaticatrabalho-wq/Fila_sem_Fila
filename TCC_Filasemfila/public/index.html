<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila Sem Fila</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>FILA SEM FILA</h1>
            <p id="status-loja">Painel em Tempo Real</p>
        </header>

        <main>
            <section class="painel-principal">
                <span class="label">CHAMANDO AGORA</span>
                <div id="senha-atual">--</div>
            </section>

            <section class="minha-senha-section">
                <input type="number" id="input-minha-senha" placeholder="Digite sua senha física" min="1" max="999">
                <button type="button" onclick="salvarMinhaSenha()">Acompanhar</button>
            </section>

            <div id="feedback-usuario" class="hidden">
                <p id="mensagem-status"></p>
                <div id="contador-faltam"></div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
