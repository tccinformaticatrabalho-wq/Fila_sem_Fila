<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Fila Sem Fila</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="app-container">

        <header>

            <h1>
                FILA SEM FILA
            </h1>

            <p id="status-loja">
                Painel em Tempo Real
            </p>

        </header>

        <main>

            <section class="painel-principal">

                <span class="label">
                    CHAMANDO AGORA
                </span>

                <div id="senha-atual">
                    00
                </div>

            </section>

            <section class="minha-senha-section">

                <button
                    id="btn-gerar-senha"
                    type="button"
                    onclick="gerarNovaSenha()"
                >
                    Gerar Senha
                </button>

                <button
                    type="button"
                    onclick="limparSenha()"
                >
                    Limpar Minha Senha
                </button>

                <button
                    type="button"
                    onclick="resetarFila()"
                >
                    Resetar Fila
                </button>

            </section>

            <section
                id="feedback-usuario"
                class="hidden"
            >

                <p id="mensagem-status"></p>

                <div id="contador-faltam"></div>

            </section>

        </main>

    </div>

    <script
        type="module"
        src="./script.js"
    ></script>

</body>

</html>
